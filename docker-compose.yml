services:
  mongo:
    image: mongo
    container_name: interview-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - interview-network

  backend:
    build: ./backend
    container_name: interview-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo
    networks:
      - interview-network

  frontend:
    build: ./frontend
    container_name: interview-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - interview-network

volumes:
  mongo_data:

networks:
  interview-network:
    driver: bridge